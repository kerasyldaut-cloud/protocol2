<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{font-family:sans-serif;background:#0f1220;color:white;text-align:center;padding:40px}
button{padding:15px 25px;margin:10px;font-size:16px;border-radius:12px;border:none;background:#6c5ce7;color:white}
</style>
</head>
<body>

<h2>PROTOCOL 2.0</h2>
<div id="info">Загрузка...</div>

<input id="goalInput" placeholder="Новая цель"/>
<button onclick="addGoal()">Добавить цель</button>

<ul id="goals"></ul>

<script>
const tg = window.Telegram?.WebApp;
tg?.expand?.();

let USER_ID = tg?.initDataUnsafe?.user?.id 
  ? String(tg.initDataUnsafe.user.id)
  : localStorage.getItem("uid") || (()=>{let r="u"+Math.random();localStorage.setItem("uid",r);return r})();

const API = window.location.origin;

let state = { goals: [] };

async function api(path,method="GET",body=null){
 const res = await fetch(path,{
  method,
  headers:{'Content-Type':'application/json'},
  body:body?JSON.stringify(body):null
 });
 return res.json();
}

async function load(){
 await api('/api/user','POST',{id:USER_ID,name:"User"});
 const goals = await api('/api/goals/'+USER_ID);
 state.goals = goals||[];
 render();
}

function render(){
 document.getElementById("info").innerText="User: "+USER_ID;
 const ul=document.getElementById("goals");
 ul.innerHTML="";
 state.goals.forEach(g=>{
   const li=document.createElement("li");
   li.innerText=g.name;
   ul.appendChild(li);
 });
}

async function addGoal(){
 const name=document.getElementById("goalInput").value.trim();
 if(!name)return;
 await api('/api/goals/'+USER_ID,'POST',{name,sphere:"life"});
 document.getElementById("goalInput").value="";
 load();
}

window.onload=load;
</script>
</body>
</html>
